name: build-apk

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install deps
        run: npm ci

      - name: Prebuild native Android project
        run: npx expo prebuild -p android --no-install
        env:
          EXPO_NO_TELEMETRY: "1"

      - name: Build release APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Locate APK
        id: apk
        run: echo "path=$(find android/app/build/outputs/apk/release -name '*.apk' | head -1)" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: orv-music-apk
          path: ${{ steps.apk.outputs.path }}

      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
          name: Orv Music ${{ github.ref_name }}
          body: |
            Standalone Android APK. Enable "install from unknown sources", download `app-release.apk`, install.
            Sign in with "اتصال با تلگرام" — the bot syncs your library into the app.
